<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Список пользователей</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f6f9; padding: 30px; }
        .box { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h2 { color: #2c3e50; text-align: center; }
        ul { list-style: none; padding: 0; }
        li { padding: 12px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; }
        a { color: #3498db; text-decoration: none; font-weight: bold; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Зарегистрированные пользователи (ДЗ №19)</h2>
        <ul>
            {% for u in users %}
                <li>
                    <span>Логин: <strong>{{ u.username }}</strong></span>
                    <a href="{% url 'user_detail' u.pk %}">Профиль →</a>
                </li>
            {% empty %}
                <li>Пользователей в системе пока нет.</li>
            {% endfor %}
        </ul>
    </div>
</body>
</html>
