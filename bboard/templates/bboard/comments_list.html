<!DOCTYPE html>
<html>
<head>
    <title>Список комментариев</title>
</head>
<body>
    <h1>Все комментарии</h1>
    <ul>
        {% for comment in comments %}
            <li>{{ comment.text }} <small>({{ comment.created_at }})</small></li>
        {% empty %}
            <li>Комментариев пока нет.</li>
        {% endfor %}
    </ul>
    <br>
    <a href="{% url 'add_comment' %}">Добавить новый комментарий</a>
</body>
</html>
