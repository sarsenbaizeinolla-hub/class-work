{% extends 'homework29/base.html' %}
{% block content %}
<div class="container mt-5">
    <h2>Рынок криптовалют</h2>
    <table class="table mt-3">
        <thead>
            <tr>
                <th>Монета</th>
                <th>Цена (USD)</th>
                <th>Изменение 24ч</th>
            </tr>
        </thead>
        <tbody>
            {% for coin in coins %}
            <tr>
                <td><img src="{{ coin.image }}" width="30"> {{ coin.name }} ({{ coin.symbol|upper }})</td>
                <td>${{ coin.current_price }}</td>
                <td class="{% if coin.price_change_percentage_24h > 0 %}text-success{% else %}text-danger{% endif %}">
                    {{ coin.price_change_percentage_24h|floatformat:2 }}%
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
