{% extends 'homework29/base.html' %}
{% block content %}
<div class="container mt-5 text-center">
    <h2>Вы уверены, что хотите удалить актив {{ asset.name }}?</h2>
    <p>Это действие нельзя будет отменить.</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger btn-lg">Удалить</button>
        <a href="{% url 'portfolio' %}" class="btn btn-secondary btn-lg">Отмена</a>
    </form>
</div>
{% endblock %}
