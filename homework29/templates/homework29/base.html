<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Система бронирования</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f4f7f6; }
        .navbar { box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-5">
        <div class="container">
            <a class="navbar-brand fw-bold" href="{% url 'index' %}"><i class="fas fa-calendar-check"></i> BookingSystem</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item"><a class="nav-link" href="{% url 'index' %}">Главная</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'booking_list' %}">Бронирования</a></li>
                    
                    {% if user.is_authenticated %}
                        <li class="nav-item ms-lg-3">
                            <a class="btn btn-outline-light px-3" href="{% url 'logout' %}"><i class="fas fa-sign-out-alt"></i> Выйти</a>
                        </li>
                    {% else %}
                        <li class="nav-item ms-lg-3">
                            <a class="nav-link btn btn-outline-light px-3" href="{% url 'login' %}"><i class="fas fa-sign-in-alt"></i> Вход</a>
                        </li>
                        <li class="nav-item ms-lg-2">
                            <a class="nav-link btn btn-warning px-3 text-dark fw-bold" href="{% url 'register' %}"><i class="fas fa-user-plus"></i> Регистрация</a>
                        </li>
                    {% endif %}
                </ul>
            </div>
        </div>
    </nav>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
