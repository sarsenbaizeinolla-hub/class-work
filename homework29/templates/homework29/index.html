<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Крипто-Трекер</title>
    <!-- Подключаем Bootstrap для красивого дизайна -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            height: 100vh;
            display: flex;
            align-items: center;
        }
    </style>
</head>
<body>
    <div class="container text-center">
        <h1 class="display-1 fw-bold mb-4">₿ Крипто-Трекер</h1>
        <p class="lead mb-5 text-secondary">Ваш персональный инструмент для отслеживания активов</p>
        
        <div class="d-grid gap-3 d-sm-flex justify-content-center">
            {% if user.is_authenticated %}
                <!-- Если пользователь уже в системе -->
                <a href="{% url 'portfolio' %}" class="btn btn-success btn-lg px-5">Перейти в портфель</a>
                <a href="{% url 'logout' %}" class="btn btn-outline-danger btn-lg px-5">Выйти</a>
            {% else %}
                <!-- Если пользователь гость -->
                <a href="{% url 'login' %}" class="btn btn-primary btn-lg px-5">Вход</a>
                <a href="{% url 'register' %}" class="btn btn-outline-light btn-lg px-5">Регистрация</a>
            {% endif %}
        </div>
    </div>
</body>
</html>
