<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Регистрация — АвтоПрокат</title>
    <style>
        :root { --bg-dark: #1b2622; --accent: #2e694f; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background: #f4f6f5; color: #333; display: flex; flex-direction: column; min-height: 100vh; }
        header { background: var(--bg-dark); color: #fff; padding: 20px 40px; border-bottom: 3px solid var(--accent); }
        header a { color: #fff; text-decoration: none; font-weight: 500; }
        
        .container { max-width: 480px; margin: 40px auto; padding: 0 20px; width: 100%; box-sizing: border-box; }
        .card { background: #fff; border-radius: 12px; padding: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); border: 1px solid #e2e8f0; }
        h2 { margin-top: 0; color: var(--bg-dark); text-align: center; margin-bottom: 25px; }
        
        form p { margin-bottom: 15px; font-size: 14px; }
        form label { display: block; margin-bottom: 5px; font-weight: 600; color: #4a5568; }
        form input { width: 100%; padding: 10px; border: 1px solid #cbd5e0; border-radius: 6px; font-size: 14px; box-sizing: border-box; }
        form ul { color: #e53e3e; font-size: 12px; padding-left: 20px; margin: 5px 0; }
        form .helptext { display: block; font-size: 11px; color: #718096; margin-top: 3px; }
        
        .btn-submit { background: var(--accent); color: white; border: none; padding: 12px; border-radius: 6px; font-size: 16px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 15px; transition: background 0.2s; }
        .btn-submit:hover { background: #23523c; }
        
        .bottom-link { text-align: center; margin-top: 20px; font-size: 14px; color: #718096; }
        .bottom-link a { color: var(--accent); text-decoration: none; font-weight: bold; }
        .bottom-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <header>
        <a href="{% url 'index' %}">← На главную</a>
    </header>

    <div class="container">
        <div class="card">
            <h2>Регистрация</h2>
            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="btn-submit">Зарегистрироваться</button>
            </form>
            <div class="bottom-link">
                Уже есть аккаунт? <a href="{% url 'login' %}">Войти</a>
            </div>
        </div>
    </div>
</body>
</html>
